name: release

# Cria a GitHub Release automaticamente quando uma tag de plugin é enviada.
# Esquema de tag: <plugin>-vX.Y.Z  (ex.: protheus-v2.0.9)

on:
  push:
    tags:
      - "*-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Release \`${GITHUB_REF_NAME}\` do dataagile-agent-kit. Detalhes no CHANGELOG.md."
